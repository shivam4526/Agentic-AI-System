version: "3.9"

services:
  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - redis

  worker:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: sh -c "pip install -r requirements.txt && python -m app.workers.worker"
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
